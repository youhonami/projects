<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Frontend App</title>
  </head>
  <body>
    <h1>Hello, Frontend!</h1>
    <!--
    HTML文書は <!DOCTYPE html>, <html>, <head>, <body> という基本構造を持つ。
    <head> にはページのメタ情報を、<body> には表示されるコンテンツを記述する。
    <h1>〜<h6> で見出しを、<p> で段落を定義する。
    <a> タグと href 属性でリンクを作成する。
    <img> タグと src, alt 属性で画像を表示する。
    <ul>（順序なし）と <ol>（順序あり）でリストを作成する。
    -->
    <!--
    <div> と <span> は、それ自体に意味を持たない汎用的なタグである。
　　　　　　　　<div> はブロックレベル要素で、改行を伴う「塊」を作る。
　　　　　　　　<span> はインライン要素で、文章の流れを壊さない「部分」を作る。
  大きなレイアウトやグループ化には <div> を、文中の特定の部分には <span> を使うのが基本的な使い分けである。
-->
  </body>
</html>
