<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS練習</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CSSの基本を学ぼう</h1>
    <p>このページでは、CSSの基本構文と適用方法を学びます。</p>
    <p>外部スタイルシートを使って、見た目を整えていきましょう。</p>
  </body>
</html>
<!--
インラインスタイル（非推奨）
HTMLに直接記述する方法
- HTMLとCSSが混在し、管理が困難になる
- 同じスタイルを複数の要素に適用する場合、コードが重複する
内部スタイルシート（限定的に使用）
- 複数のHTMLファイルで同じスタイルを使う場合、コードが重複する
- 小規模なページやプロトタイプ作成時に便利
外部スタイルシート（推奨）
CSSを別ファイル（.css）に記述し、HTMLから読み込む方法
- HTMLとCSSを分離でき、管理しやすい
- 複数のHTMLファイルで同じCSSファイルを共有できる
- ブラウザがCSSファイルをキャッシュするため、ページ読み込みが高速化される
-->
